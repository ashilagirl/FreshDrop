<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#2e7d32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Fresh%20Drop%20POS%20V3%22,%22short_name%22:%22FDPOS%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f5fff0%22,%22theme_color%22:%22%232e7d32%22,%22icons%22:[{%22src%22:%22https://placehold.co/144x144/2e7d32/white?text=FD%22,%22sizes%22:%22144x144%22,%22type%22:%22image/png%22}]}">
  <title>Fresh Drop POS V3 | Juice Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- LOGIN VIEW -->
    <div id="loginView" class="view active">
      <div class="login-card">
        <div class="logo-area">
          <div class="logo-icon">🍹</div>
          <h1>FRESH DROP</h1>
          <p>Juice Bar POS · V3</p>
        </div>
        <div class="input-group">
          <label>Enter PIN</label>
          <input type="password" id="pinInput" placeholder="Staff or Admin PIN" maxlength="4" inputmode="numeric">
        </div>
        <button id="loginBtn" class="btn btn-primary btn-block">ACCESS SYSTEM</button>
        <div class="info-hint">Staff: 2000 | Admin: 2060</div>
      </div>
    </div>

    <!-- MAIN POS VIEW -->
    <div id="posView" class="view">
      <!-- Top Bar -->
      <header class="pos-header">
        <div class="user-badge" id="userRoleBadge">👤 Staff Mode</div>
        <button id="logoutBtn" class="icon-btn">🚪</button>
      </header>

      <!-- Tab Navigation (Roles) -->
      <div class="tab-bar">
        <button data-tab="orders" class="tab-btn active">📋 ORDERS</button>
        <button data-tab="stock" class="tab-btn">📦 STOCK</button>
        <button data-tab="reports" class="tab-btn">📊 REPORTS</button>
        <button data-tab="admin" id="adminTabBtn" class="tab-btn admin-only" style="display:none;">⚙️ ADMIN</button>
      </div>

      <!-- ORDERS TAB -->
      <div id="ordersTab" class="tab-content active">
        <div class="tables-bar">
          <div class="table-scroll">
            <button data-table="table1" class="table-chip active">🍽️ Table 1</button>
            <button data-table="table2" class="table-chip">🍽️ Table 2</button>
            <button data-table="table3" class="table-chip">🍽️ Table 3</button>
            <button data-table="table4" class="table-chip">🍽️ Table 4</button>
            <button data-table="table5" class="table-chip">🍽️ Table 5</button>
            <button data-table="takeaway" class="table-chip">🛍️ Takeaway</button>
          </div>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid" id="menuGrid"></div>

        <!-- Cart Section -->
        <div class="cart-panel">
          <div class="cart-header">
            <span>🛒 Current Cart · <span id="currentTableName">Table 1</span></span>
            <button id="clearCartBtn" class="small-btn">Clear</button>
          </div>
          <div id="cartItems" class="cart-list"></div>
          <div class="cart-total">TOTAL: LKR <span id="cartTotal">0</span></div>
          <button id="checkoutBtn" class="btn btn-primary">✅ CHECKOUT & DEDUCT STOCK</button>
        </div>
      </div>

      <!-- STOCK TAB -->
      <div id="stockTab" class="tab-content">
        <div class="search-bar"><input type="text" id="stockSearch" placeholder="🔍 Search ingredient..."></div>
        <div class="low-stock-banner" id="lowStockBanner"></div>
        <div id="stockList" class="stock-list"></div>
        <div class="admin-only" id="stockAdminActions" style="display:none;">
          <button id="addIngredientBtn" class="btn btn-outline">➕ Add Ingredient</button>
          <button id="restockSelectedBtn" class="btn btn-outline">📦 Restock Selected</button>
        </div>
      </div>

      <!-- REPORTS TAB -->
      <div id="reportsTab" class="tab-content">
        <div class="dashboard-cards" id="dashboardCards"></div>
        <div class="report-buttons">
          <button id="dailyReportBtn" class="btn btn-small">📅 Daily Report</button>
          <button id="weeklyReportBtn" class="btn btn-small">📆 Weekly Report</button>
          <button id="monthlyReportBtn" class="btn btn-small">📈 Monthly Report</button>
        </div>
        <div id="reportDisplay" class="report-display"></div>
      </div>

      <!-- ADMIN TAB -->
      <div id="adminTab" class="tab-content">
        <div class="admin-section">
          <h3>🔐 Admin Control</h3>
          <button id="resetDayBtn" class="btn btn-warning">🔄 Reset Day (Clear Today)</button>
          <button id="closeDayBtn" class="btn btn-danger">🏁 CLOSE DAY & ARCHIVE</button>
          <div class="history-viewer">
            <h4>📜 Previous Days History</h4>
            <div id="historyList" class="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
  <script>
  // Register Service Worker for PWA offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered:', reg))
        .catch(err => console.log('SW error:', err));
    });
  }
    </script>
</body>
</html>
