<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#2e7d32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fresh Drop POS V3 | Complete Edition</title>
  <link rel="stylesheet" href="style.css?v=5">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="posView" class="view active">
      <header class="pos-header">
        <div class="user-badge">
          <select id="roleSwitcher" class="role-select">
            <option value="staff">🥤 Staff Mode</option>
            <option value="admin">👑 Admin Mode</option>
          </select>
        </div>
        <div class="header-buttons">
          <button id="manageTablesBtn" class="icon-btn" title="Manage Tables">🗂️</button>
          <button id="manageItemsBtn" class="icon-btn" title="Manage Menu Items">📝</button>
          <button id="managePricesBtn" class="icon-btn" title="Manage Prices">💰</button>
          <button id="resetAllBtn" class="icon-btn" title="Reset All Data">🔄</button>
        </div>
      </header>

      <div class="tab-bar">
        <button data-tab="orders" class="tab-btn active">📋 ORDERS</button>
        <button data-tab="stock" class="tab-btn">📦 STOCK</button>
        <button data-tab="reports" class="tab-btn">📊 REPORTS</button>
        <button data-tab="admin" class="tab-btn">⚙️ ADMIN</button>
      </div>

      <div id="ordersTab" class="tab-content active">
        <div class="tables-bar">
          <div class="table-scroll" id="tablesContainer"></div>
        </div>
        <div class="category-bar" id="categoryBar"></div>
        <div class="menu-grid" id="menuGrid"></div>
        <div class="cart-panel">
          <div class="cart-header">
            <span>🛒 Current Cart · <span id="currentTableName">Table 1</span></span>
            <button id="clearCartBtn" class="small-btn">Clear</button>
          </div>
          <div id="cartItems" class="cart-list"></div>
          <div class="cart-total">TOTAL: LKR <span id="cartTotal">0</span></div>
          <button id="checkoutBtn" class="btn btn-primary">✅ CHECKOUT & PAY</button>
        </div>
      </div>

      <div id="stockTab" class="tab-content">
        <div class="search-bar"><input type="text" id="stockSearch" placeholder="🔍 Search ingredient..."></div>
        <div class="low-stock-banner" id="lowStockBanner"></div>
        <div id="stockList" class="stock-list"></div>
        <div style="margin-top: 1rem; display: flex; gap: 0.6rem; flex-wrap: wrap;">
          <button id="addIngredientBtn" class="btn btn-outline">➕ Add Ingredient</button>
        </div>
      </div>

      <div id="reportsTab" class="tab-content">
        <div class="dashboard-cards" id="dashboardCards"></div>
        <div class="report-buttons">
          <button id="dailyReportBtn" class="btn btn-small">📅 Daily Report</button>
          <button id="weeklyReportBtn" class="btn btn-small">📆 Weekly Report</button>
          <button id="monthlyReportBtn" class="btn btn-small">📈 Monthly Report</button>
          <button id="profitTrendBtn" class="btn btn-small" style="background: #4caf50;">📈 Profit Trend</button>
        </div>
        <div id="reportDisplay" class="report-display"></div>
      </div>

      <div id="adminTab" class="tab-content">
        <div class="admin-section">
          <h3>🔐 Admin Control</h3>
          <button id="resetDayBtn" class="btn btn-warning">🔄 Reset Day</button>
          <button id="closeDayBtn" class="btn btn-danger">🏁 CLOSE DAY & ARCHIVE</button>
          <div class="history-viewer">
            <h4>📜 Previous Days History</h4>
            <div id="historyList" class="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODALS -->
  <div id="receiptModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="receiptContent"></div><div class="receipt-buttons"><button id="printReceiptBtn" class="btn btn-primary">🖨️ Print</button><button id="pdfReceiptBtn" class="btn btn-primary">📄 PDF</button><button id="whatsappReceiptBtn" class="btn btn-success">💬 WhatsApp</button></div></div></div>
  <div id="tablesModal" class="modal"><div class="modal-content"><span class="close-tables">&times;</span><h2>Manage Tables</h2><div id="tablesList"></div><button id="addTableBtn" class="btn btn-primary">➕ Add Table</button><button id="saveTablesBtn" class="btn btn-primary" style="margin-top:10px;">💾 Save Tables</button></div></div>
  <div id="itemsModal" class="modal"><div class="modal-content"><span class="close-items">&times;</span><h2>Manage Menu Items</h2><div id="itemsListContainer"></div><button id="addNewItemBtn" class="btn btn-primary">➕ Add New Item</button></div></div>
  <div id="itemFormModal" class="modal"><div class="modal-content"><span class="close-item-form">&times;</span><h2 id="itemFormTitle">Add New Item</h2><form id="itemForm"><input type="hidden" id="itemId"><div class="form-group"><label>Item Name:</label><input type="text" id="itemName" required></div><div class="form-group"><label>Price (LKR):</label><input type="number" id="itemPrice" required></div><div class="form-group"><label>Category:</label><select id="itemCategory" required><option value="fresh_juice">Fresh Juice</option><option value="milkshake">Milkshake</option><option value="special_drink">Special Drink</option><option value="seasonal_special">Seasonal Special</option></select></div><div class="form-group"><label>Ingredients:</label><div id="ingredientsList"></div><button type="button" id="addIngredientFieldBtn" class="btn btn-small">+ Add Ingredient</button></div><button type="submit" class="btn btn-primary">💾 Save Item</button></form></div></div>
  <div id="customerModal" class="modal"><div class="modal-content"><h2>Customer Information</h2><div class="form-group"><label>Customer Name:</label><input type="text" id="customerName" placeholder="Enter customer name" required></div><button id="confirmCustomerBtn" class="btn btn-primary">Generate Receipt</button></div></div>

  <script type="module" src="app.js?v=5"></script>
</body>
</html>
